name: Validate lab

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Validate content and build Astro
        run: npm run check
      - name: Install Playwright without changing the lockfile
        run: npm install --no-save --package-lock=false @playwright/test@1.55.0
      - name: Install Chromium for smoke tests
        run: npx playwright install --with-deps chromium
      - name: Run browser smoke tests
        run: npm run test:smoke
