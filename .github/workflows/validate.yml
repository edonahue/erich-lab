name: Validate lab

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            tools/package-lock.json
      - name: Install application dependencies
        run: npm ci
      - name: Install locked development tooling
        run: npm run tools:install
      - name: Check formatting
        run: npm run format:check
      - name: Validate content and build Astro
        run: npm run check
      - name: Install Chromium for smoke tests
        run: npm run --prefix tools playwright:install -- --with-deps chromium
      - name: Run browser smoke tests
        run: npm run test:smoke
