<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 525" role="img" aria-labelledby="t d"><title id="t">Music-Credit Graph Study Lab</title><desc id="d">A logical data pipeline feeding four small worker nodes and a public application.</desc><rect width="1200" height="525" rx="24" fill="#17242b"/><g fill="none" stroke="#fffdf7" stroke-width="7" stroke-linecap="round"><path d="M205 175H365M485 175H645M765 175H925"/><path d="M705 235V315M645 355H435M765 355H975"/></g><g font-family="Inter,system-ui,sans-serif" text-anchor="middle"><g><rect x="65" y="115" width="140" height="120" rx="24" fill="#a65d35"/><text x="135" y="165" fill="#fffdf7" font-size="25" font-weight="700">Credits</text><text x="135" y="198" fill="#fffdf7" font-size="18">source data</text></g><g><rect x="365" y="115" width="120" height="120" rx="24" fill="#2f6077"/><text x="425" y="165" fill="#fffdf7" font-size="23" font-weight="700">Python</text><text x="425" y="198" fill="#fffdf7" font-size="17">normalize</text></g><g><rect x="645" y="115" width="120" height="120" rx="24" fill="#a65d35"/><text x="705" y="165" fill="#fffdf7" font-size="22" font-weight="700">Graph</text><text x="705" y="198" fill="#fffdf7" font-size="17">snapshot</text></g><g><rect x="925" y="115" width="210" height="120" rx="24" fill="#2f6077"/><text x="1030" y="165" fill="#fffdf7" font-size="22" font-weight="700">Public game</text><text x="1030" y="198" fill="#fffdf7" font-size="17">static first</text></g><g fill="#cf7a4c"><circle cx="435" cy="355" r="40"/><circle cx="615" cy="355" r="40"/><circle cx="795" cy="355" r="40"/><circle cx="975" cy="355" r="40"/></g><g fill="#fffdf7" font-size="18" font-weight="700"><text x="435" y="362">Pi 1</text><text x="615" y="362">Pi 2</text><text x="795" y="362">Pi 3</text><text x="975" y="362">Pi 4</text></g><text x="600" y="475" fill="#fffdf7" font-family="Georgia,serif" font-size="50">Music-Credit Graph Study Lab</text></g></svg>