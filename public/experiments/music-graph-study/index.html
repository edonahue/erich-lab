<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="An adaptive quiz and architecture guide for a distributed music-credit graph project.">
  <link rel="canonical" href="https://lab.erichdonahue.com/experiments/music-graph-study/">
  <meta name="theme-color" content="#111820" data-theme-color>
  <title>Music-Credit Graph Study Lab</title>
  <script>
    (() => {
      const key = 'erich-lab-theme';
      const stored = window.localStorage.getItem(key);
      const theme = stored === 'light' ? 'light' : 'dark';
      document.documentElement.dataset.theme = theme;
      document.querySelector('[data-theme-color]')?.setAttribute('content', theme === 'light' ? '#f3f0e7' : '#111820');
    })();
  </script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111820;
      --surface: #18232c;
      --ink: #eef2ef;
      --line: rgba(238, 242, 239, .16);
      --accent: #cf7a4c;
    }
    :root[data-theme="light"] {
      color-scheme: light;
      --bg: #f3f0e7;
      --surface: #fffdf7;
      --ink: #17242b;
      --line: #d8d2c4;
      --accent: #2f6077;
    }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body {
      display: grid;
      grid-template-rows: 46px minmax(0, 1fr);
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
    }
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
      background: var(--surface);
      color: var(--ink);
      font-size: 13px;
    }
    nav div { display: flex; align-items: center; gap: 16px; }
    nav a { color: inherit; text-decoration: none; opacity: .78; }
    nav a:hover, nav a:focus-visible { opacity: 1; text-decoration: underline; text-underline-offset: 3px; }
    .title { font-weight: 750; opacity: 1; }
    .theme-toggle {
      width: 42px;
      height: 26px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: color-mix(in srgb, var(--surface) 70%, var(--ink) 10%);
      cursor: pointer;
      padding: 3px;
    }
    .theme-toggle span {
      display: block;
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: inset -4px -3px 0 rgba(0, 0, 0, .18);
      transition: transform 180ms ease;
    }
    .theme-toggle[aria-pressed="true"] span { transform: translateX(16px); }
    iframe { display: block; width: 100%; height: 100%; border: 0; background: var(--bg); }
    @media (max-width: 620px) {
      nav div a:first-child { display: none; }
      nav div { gap: 10px; }
    }
    @media (prefers-reduced-motion: reduce) {
      .theme-toggle span { transition: none; }
    }
  </style>
</head>
<body>
  <nav aria-label="Experiment navigation">
    <a class="title" href="/">Erich's Lab</a>
    <div>
      <a href="/projects/music-graph-study/">Project notes</a>
      <a href="https://erichdonahue.com">Main website</a>
      <button class="theme-toggle" type="button" aria-label="Switch to light theme" aria-pressed="false" data-theme-toggle><span aria-hidden="true"></span></button>
    </div>
  </nav>
  <iframe src="./music_graph_study_lab_complete_fixed.html" title="Music-Credit Graph Study Lab" data-study-frame></iframe>
  <script>
    (() => {
      const key = 'erich-lab-theme';
      const root = document.documentElement;
      const toggle = document.querySelector('[data-theme-toggle]');
      const frame = document.querySelector('[data-study-frame]');
      const meta = document.querySelector('[data-theme-color]');

      const syncFrame = (theme) => {
        const doc = frame?.contentDocument;
        if (doc) doc.documentElement.dataset.theme = theme;
      };

      const apply = (theme, persist = false) => {
        const next = theme === 'light' ? 'light' : 'dark';
        root.dataset.theme = next;
        if (persist) window.localStorage.setItem(key, next);
        meta?.setAttribute('content', next === 'light' ? '#f3f0e7' : '#111820');
        const light = next === 'light';
        toggle?.setAttribute('aria-label', light ? 'Switch to dark theme' : 'Switch to light theme');
        toggle?.setAttribute('aria-pressed', String(light));
        syncFrame(next);
      };

      toggle?.addEventListener('click', () => apply(root.dataset.theme === 'light' ? 'dark' : 'light', true));
      frame?.addEventListener('load', () => syncFrame(root.dataset.theme));
      window.addEventListener('storage', (event) => {
        if (event.key === key) apply(event.newValue, false);
      });
      apply(root.dataset.theme, false);
    })();
  </script>
</body>
</html>
